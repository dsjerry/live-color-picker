name: Build Android

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - apk
          - appbundle
        default: apk

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        if: ${{ inputs.build-type == 'apk' }}
        run: flutter build apk --release --split-per-abi

      - name: Build AppBundle
        if: ${{ inputs.build-type == 'appbundle' }}
        run: flutter build appbundle --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-${{ github.run_attempt }}
          name: 'Android ${{ inputs.build-type }} — Build #${{ github.run_number }}'
          files: |
            ${{ inputs.build-type == 'apk' && 'build/app/outputs/flutter-apk/app-*-release.apk' || 'build/app/outputs/bundle/release/app-release.aab' }}
